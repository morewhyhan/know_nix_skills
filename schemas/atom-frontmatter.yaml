# v1.1 canonical atom frontmatter JSON Schema (YAML form)

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Nix Knowledge Atom Frontmatter"
type: object
additionalProperties: false
required:
  - id
  - status
  - source
  - tags
  - aliases
  - depends_on
  - components

properties:
  id:
    type: string
    minLength: 1
    description: Stable identifier in the source language; prefer an exact established disciplinary term, then colloquial language, then a descriptive phrase, and use a coined term only as a last resort. The file name must equal id plus .md.
  status:
    type: string
    enum:
      - draft
      - stable
      - deprecated
      - merged
  source:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
    description: Every item must be a resolvable absolute path, workspace-relative path, or URL.
  tags:
    type: array
    minItems: 1
    maxItems: 3
    uniqueItems: true
    items:
      type: string
      minLength: 1
    description: One to three CODE/CLC-official-name navigation values selected after scanning all 22 CLC basic classes.
  aliases:
    type: array
    minItems: 2
    maxItems: 6
    uniqueItems: true
    items:
      type: string
      minLength: 1
    description: Searchable professional variants, source wording, and at least one expression ordinary readers would actually use.
  depends_on:
    type: array
    uniqueItems: true
    items:
      type: string
      minLength: 1
    description: Atom IDs strictly required to understand or invoke this atom.
  components:
    type: array
    uniqueItems: true
    items:
      type: string
      minLength: 1
    description: Lower-level atom IDs whose composition creates this system atom; an empty list marks a complete base atom.

x-rules:
  identity: File name must equal id plus .md.
  exact_fields: No frontmatter keys other than the seven properties above are allowed.
  new_atom_status: New atoms start as draft.
  relations: Every target must exist; body dependency and component wikilinks must exactly match frontmatter.
  evidence: Every atom must distinguish source support, compiler inference, pending validation, naming basis, domain-binding validation state, and independent semantic review state.
  stable: Stable atoms must pass deterministic and independent semantic review, cite at least two locally resolvable source files with distinct identities and content hashes, and satisfy the evidence threshold in the v1.1 contract.
