# v0.4 mechanism atom frontmatter schema

required:
  id:
    description: Stable atom identifier in the source material's main language. Chinese input should use a Chinese ID, not an English slug.
    example: 固定成本摊薄-v1
  status:
    description: Maintenance state.
    allowed:
      - draft
      - stable
      - deprecated
      - merged
  source:
    description: Source pointer. Does not need to contain full original material.
    suggested_fields:
      - type
      - title
      - date
      - locator
  depends_on:
    description: Atom IDs required to understand or use this atom.
    type: list
  components:
    description: Lower-level atom IDs that compose this atom. Empty list means base atom.
    type: list

optional:
  domain:
    description: For domain-bound atoms, the domain this atom belongs to. Leave empty or omit for de-domain atoms.
    example: 手冲咖啡
  de_domain:
    description: Whether this atom has been extracted as a cross-domain reusable mechanism. true for mechanism atoms that can rebind to multiple domains.
    type: boolean

forbidden_in_core:
  - type
  - object_kind
  - level
  - content_shape
  - system_scope
  - used_by
  - reuse_count
  - feedback
  - part_of
  - closure
  - related
  - see_also
  - replaces
  - replaced_by
  - merge_note

rule: If a value can be inferred from the folder, dependency graph, reverse references, or atom body, do not write it as atom frontmatter.

merged_rule: When status is merged, write the target atom and merge reason in the body, not in frontmatter.

identity_rule: File name must equal id plus ".md".

stability_rule: New atoms start as draft. Mark stable only after quality gates, hard validation, and batch validation pass.

mechanism_rule: Mechanism atoms must have mechanism core, participating roles, activation conditions, and migration boundaries written in the body. These do not need separate frontmatter fields.
